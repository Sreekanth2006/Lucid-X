<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid-X Real-Time Emotion Recognition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }

        .realtime-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 2px solid #34d399;
            padding: 30px 20px;
            margin-bottom: 30px;
            border-radius: 12px;
        }

        .header h1 {
            margin: 0;
            color: #34d399;
            font-size: 2rem;
        }

        .header p {
            color: #cbd5e1;
            margin: 10px 0 0 0;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }

        .section h2 {
            color: #34d399;
            margin-top: 0;
            font-size: 1.1rem;
        }

        .capture-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .video-preview {
            width: 100%;
            aspect-ratio: 4/3;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            -webkit-transform: scaleX(-1);
            transform: scaleX(-1);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #0ea5e9;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #06b6d4;
        }

        .btn-primary:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .btn-danger {
            background: #f87171;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #dc2626;
        }

        .audio-visualizer {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            height: 100px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
        }

        .audio-bar {
            width: 4px;
            background: linear-gradient(180deg, #34d399 0%, #0ea5e9 100%);
            border-radius: 2px;
            transition: height 0.05s;
            min-height: 4px;
        }

        .status-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #cbd5e1;
        }

        .status-indicator.active {
            background: #34d399;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .emotion-display {
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .emotion-display.active {
            border-color: #34d399;
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.2);
        }

        .emotion-label {
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .emotion-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #34d399;
        }

        .confidence-bar {
            width: 100%;
            height: 20px;
            background: #0f172a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #334155;
            margin-bottom: 8px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #34d399 0%, #0ea5e9 100%);
            transition: width 0.3s;
        }

        .confidence-text {
            font-size: 0.85rem;
            color: #cbd5e1;
            font-weight: 600;
        }

        .debug-log {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.75rem;
            font-family: monospace;
            color: #cbd5e1;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-line { padding: 2px 0; border-bottom: 1px solid #334155; }
        .log-error { color: #f87171; }
        .log-success { color: #34d399; }
        .log-info { color: #0ea5e9; }
    </style>
</head>
<body>
    
    <div class="realtime-container">
        
        <div class="header">
            <h1>🎤 Real-Time Emotion Recognition</h1>
            <p>Audio + Face Detection | Updates every second</p>
        </div>

        <div class="main-grid">
            
            <!-- Capture Section -->
            <div class="section">
                <h2>📹 Capture</h2>
                
                <div class="capture-container">
                    <div class="status-box">
                        <div class="status-indicator" id="statusIndicator"></div>
                        <div>
                            <div style="font-size: 0.85rem; color: #94a3b8;">Status</div>
                            <div id="statusText" style="font-weight: 600; color: #cbd5e1;">Ready</div>
                        </div>
                    </div>

                    <div class="video-preview">
                        <video id="video" playsinline autoplay muted></video>
                    </div>

                    <div>
                        <div style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 8px;">Audio Level</div>
                        <div class="audio-visualizer" id="audioVisualizer"></div>
                    </div>

                    <div class="controls">
                        <button class="btn btn-primary" id="startBtn" onclick="startCapture()">Start</button>
                        <button class="btn btn-danger" id="stopBtn" onclick="stopCapture()" disabled>Stop</button>
                    </div>
                </div>
            </div>

            <!-- Live Results -->
            <div class="section">
                <h2>📊 Live Results</h2>
                
                <div class="results-grid">
                    <div class="emotion-display" id="audioEmotionDisplay">
                        <div class="emotion-label">Audio</div>
                        <div class="emotion-value" id="audioEmotion">--</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="audioConfidenceFill" style="width: 0%;"></div>
                        </div>
                        <div class="confidence-text" id="audioConfidenceText">0%</div>
                    </div>

                    <div class="emotion-display" id="faceEmotionDisplay">
                        <div class="emotion-label">Face</div>
                        <div class="emotion-value" id="faceEmotion">--</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="faceConfidenceFill" style="width: 0%;"></div>
                        </div>
                        <div class="confidence-text" id="faceConfidenceText">0%</div>
                    </div>

                    <div class="emotion-display" id="fusionEmotionDisplay" style="grid-column: 1 / -1;">
                        <div class="emotion-label">Final Result</div>
                        <div class="emotion-value" id="fusionEmotion">--</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="fusionConfidenceFill" style="width: 0%;"></div>
                        </div>
                        <div class="confidence-text" id="fusionConfidenceText">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Debug Log -->
        <div class="debug-log" id="debugLog"></div>

    </div>

    <!-- Load Models -->
    <script async src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.5.0/dist/tf-core.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.5.0/dist/tf-converter.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>

    <script>
        let state = {
            isCapturing: false,
            modelsLoaded: false,
            audioContext: null,
            analyser: null,
            mediaRecorder: null,
            animationId: null,
            silenceCounter: 0,
            isSilent: true,
            lastChunkTime: 0,
            audioChunks: [],
            faceDetectInterval: null
        };

        function log(msg, type = 'info') {
            const debugLog = document.getElementById('debugLog');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.textContent = `[${time}] ${msg}`;
            debugLog.appendChild(line);
            debugLog.scrollTop = debugLog.scrollHeight;
            while (debugLog.children.length > 20) debugLog.removeChild(debugLog.firstChild);
            console.log(msg);
        }

        function updateStatus(text, active = false) {
            document.getElementById('statusText').textContent = text;
            const indicator = document.getElementById('statusIndicator');
            if (active) {
                indicator.classList.add('active');
            } else {
                indicator.classList.remove('active');
            }
        }

        async function startCapture() {
            try {
                log('Starting capture...', 'info');
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                });

                const video = document.getElementById('video');
                video.srcObject = stream;
                log('Camera opened', 'success');

                // Audio setup
                state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                state.analyser = state.audioContext.createAnalyser();
                state.analyser.fftSize = 256;
                
                const source = state.audioContext.createMediaStreamSource(stream);
                source.connect(state.analyser);
                log('Audio context ready', 'success');

                // Media recorder
                state.mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                state.audioChunks = [];
                state.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) state.audioChunks.push(e.data);
                };
                state.mediaRecorder.start();

                // UI
                state.isCapturing = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                updateStatus('Recording...', true);

                // Load models
                if (!state.modelsLoaded) {
                    await loadModels();
                }

                // Start loops
                analyzeAudio();
                detectFace();
                sendAudio();

            } catch (err) {
                log(`ERROR: ${err.message}`, 'error');
                updateStatus('Error', false);
            }
        }

        function stopCapture() {
            state.isCapturing = false;
            if (document.getElementById('video').srcObject) {
                document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
            }
            if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
                state.mediaRecorder.stop();
            }
            if (state.animationId) cancelAnimationFrame(state.animationId);
            if (state.faceDetectInterval) clearInterval(state.faceDetectInterval);
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            updateStatus('Stopped', false);
            log('Capture stopped', 'success');
        }

        async function loadModels() {
            try {
                log('Loading face detection models...', 'info');
                const uri = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';
                await faceapi.nets.tinyFaceDetector.loadFromUri(uri);
                await faceapi.nets.faceExpressionNet.loadFromUri(uri);
                state.modelsLoaded = true;
                log('Models loaded', 'success');
            } catch (e) {
                log(`Model error: ${e.message}`, 'error');
            }
        }

        function analyzeAudio() {
            if (!state.isCapturing) return;

            const data = new Uint8Array(state.analyser.frequencyBinCount);
            state.analyser.getByteFrequencyData(data);

            // Draw visualizer
            const container = document.getElementById('audioVisualizer');
            container.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const avg = data.slice(i * 12, (i + 1) * 12).reduce((a, b) => a + b, 0) / 12;
                const bar = document.createElement('div');
                bar.className = 'audio-bar';
                bar.style.height = Math.max((avg / 255) * 100, 5) + '%';
                container.appendChild(bar);
            }

            // Detect speech
            const level = data.reduce((a, b) => a + b, 0) / data.length;
            if (level < 25) {
                state.silenceCounter++;
                if (state.silenceCounter > 5) {
                    state.isSilent = true;
                }
            } else {
                state.silenceCounter = 0;
                state.isSilent = false;
            }

            state.animationId = requestAnimationFrame(analyzeAudio);
        }

        function sendAudio() {
            if (!state.isCapturing) return;

            const now = Date.now();
            if (now - state.lastChunkTime >= 2000 && !state.isSilent && state.audioChunks.length > 0) {
                const blob = new Blob(state.audioChunks, { type: 'audio/webm' });
                state.audioChunks = [];
                state.lastChunkTime = now;
                
                log('Sending audio chunk...', 'info');

                const formData = new FormData();
                formData.append('audio', blob, 'audio.webm');

                fetch('/api/emotion/audio', { method: 'POST', body: formData })
                    .then(r => r.json())
                    .then(result => {
                        if (result.success) {
                            const e = result.emotion.toUpperCase();
                            const c = Math.round(result.confidence * 100);
                            log(`Audio: ${e} (${c}%)`, 'success');
                            updateAudioDisplay(e, result.confidence);
                        }
                    })
                    .catch(e => log(`API error: ${e}`, 'error'));
            }

            setTimeout(sendAudio, 100);
        }

        function updateAudioDisplay(emotion, confidence) {
            document.getElementById('audioEmotion').textContent = emotion;
            const c = Math.round(confidence * 100);
            document.getElementById('audioConfidenceFill').style.width = c + '%';
            document.getElementById('audioConfidenceText').textContent = c + '%';
            document.getElementById('audioEmotionDisplay').classList.add('active');
        }

        async function detectFace() {
            if (!state.isCapturing || !state.modelsLoaded) {
                setTimeout(detectFace, 500);
                return;
            }

            try {
                const video = document.getElementById('video');
                const detections = await faceapi
                    .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceExpressions();

                if (detections && detections.expressions) {
                    const [emotion, score] = Object.entries(detections.expressions)
                        .sort((a, b) => b[1] - a[1])[0];
                    const e = emotion.toUpperCase();
                    const c = Math.round(score * 100);
                    log(`Face: ${e} (${c}%)`, 'success');
                    updateFaceDisplay(e, score);
                } else {
                    updateFaceDisplay('--', 0);
                }
            } catch (e) {
                log(`Face error: ${e.message}`, 'error');
            }

            setTimeout(detectFace, 500);
        }

        function updateFaceDisplay(emotion, confidence) {
            document.getElementById('faceEmotion').textContent = emotion;
            const c = Math.round(confidence * 100);
            document.getElementById('faceConfidenceFill').style.width = c + '%';
            document.getElementById('faceConfidenceText').textContent = c + '%';
            
            if (emotion !== '--') {
                document.getElementById('faceEmotionDisplay').classList.add('active');
            }
        }

        window.addEventListener('load', () => {
            log('Dashboard ready', 'success');
        });
    </script>
</body>
</html>
