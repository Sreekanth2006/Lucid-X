<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid-X Real-Time Emotion Recognition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-0: #08111d;
            --bg-1: #0d1f33;
            --bg-2: #142942;
            --surface: rgba(9, 24, 40, 0.76);
            --surface-alt: rgba(6, 19, 32, 0.9);
            --line: rgba(124, 155, 186, 0.28);
            --line-strong: rgba(86, 203, 255, 0.5);
            --text: #e9f5ff;
            --text-soft: #9fbbd3;
            --mint: #33dba7;
            --cyan: #2db8ff;
            --amber: #ffcf70;
            --danger: #ff7171;
            --radius-lg: 18px;
            --radius-md: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            background:
                radial-gradient(circle at 12% -4%, rgba(45, 184, 255, 0.2), transparent 36%),
                radial-gradient(circle at 86% 10%, rgba(51, 219, 167, 0.18), transparent 30%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1) 46%, var(--bg-2));
            min-height: 100vh;
        }

        .realtime-container {
            max-width: 1260px;
            margin: 0 auto;
            padding: 24px;
            animation: enter 0.7s ease;
        }

        .header {
            position: relative;
            overflow: hidden;
            background: linear-gradient(130deg, rgba(18, 45, 70, 0.92), rgba(11, 30, 50, 0.8));
            border: 1px solid var(--line);
            box-shadow: 0 20px 45px rgba(0, 7, 18, 0.45);
            padding: 30px 26px;
            margin-bottom: 24px;
            border-radius: var(--radius-lg);
        }

        .header::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            transform: translateX(-100%);
            animation: shimmer 5.8s infinite;
            pointer-events: none;
        }

        .header h1 {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            color: #d8f5ff;
            letter-spacing: 0.2px;
            font-size: clamp(1.5rem, 3vw, 2.3rem);
        }

        .header p {
            margin: 8px 0 0;
            color: var(--text-soft);
            font-size: 0.98rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 24px;
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 18px;
            backdrop-filter: blur(7px);
            box-shadow: 0 14px 30px rgba(2, 9, 20, 0.34);
            animation: riseIn 0.65s ease both;
        }

        .section:nth-child(2) {
            animation-delay: 0.12s;
        }

        .section h2 {
            margin: 0 0 14px;
            font-size: 1.05rem;
            font-weight: 700;
            color: #cfeeff;
            letter-spacing: 0.35px;
        }

        .capture-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .video-preview {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: var(--surface-alt);
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: saturate(1.05) contrast(1.03);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid transparent;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(1, 12, 25, 0.42);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(120deg, #1f8fff, #26c7ff);
            color: #f4fbff;
        }

        .btn-primary:disabled {
            background: #4f6075;
            color: #c7d7e8;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-danger {
            background: linear-gradient(120deg, #ff7a79, #ff6e55);
            color: #fff;
        }

        .audio-visualizer {
            background: var(--surface-alt);
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            padding: 14px;
            height: 110px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
        }

        .audio-bar {
            width: 4px;
            min-height: 4px;
            border-radius: 2px;
            background: linear-gradient(180deg, var(--mint), var(--cyan));
            transition: height 0.06s linear;
        }

        .status-box {
            background: var(--surface-alt);
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #9caec2;
        }

        .status-indicator.active {
            background: var(--mint);
            box-shadow: 0 0 0 7px rgba(51, 219, 167, 0.14);
            animation: pulse 1.35s infinite;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .emotion-display {
            background: linear-gradient(165deg, rgba(8, 24, 39, 0.96), rgba(7, 22, 36, 0.9));
            border: 1px solid rgba(106, 146, 180, 0.3);
            border-radius: var(--radius-md);
            padding: 18px;
            text-align: center;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
        }

        .emotion-display.active {
            border-color: var(--line-strong);
            box-shadow: 0 0 0 1px rgba(45, 184, 255, 0.25), 0 12px 20px rgba(4, 20, 33, 0.4);
            transform: translateY(-1px);
        }

        .emotion-label {
            color: var(--text-soft);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            margin-bottom: 8px;
        }

        .emotion-value {
            margin-bottom: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.9rem, 3.5vw, 2.9rem);
            font-weight: 700;
            color: #63e8c8;
            line-height: 1.05;
        }

        .confidence-bar {
            width: 100%;
            height: 16px;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 8px;
            border: 1px solid rgba(112, 149, 182, 0.42);
            background: rgba(6, 21, 34, 0.9);
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--mint), var(--cyan));
            transition: width 0.32s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .confidence-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            color: #d5e8fa;
            font-weight: 700;
        }

        .debug-log {
            background: var(--surface-alt);
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            padding: 12px;
            max-height: 165px;
            overflow-y: auto;
            margin-top: 10px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            font-size: 0.76rem;
            font-family: 'Space Grotesk', monospace;
            color: #d7ecff;
        }

        .log-line {
            padding: 3px 0;
            border-bottom: 1px solid rgba(85, 115, 144, 0.3);
        }

        .log-error {
            color: var(--danger);
        }

        .log-success {
            color: var(--mint);
        }

        .log-info {
            color: var(--cyan);
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.68;
            }
        }

        @keyframes enter {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            60%,
            100% {
                transform: translateX(120%);
            }
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .realtime-container {
                padding: 16px;
            }
        }

        @media (max-width: 560px) {
            .results-grid {
                grid-template-columns: 1fr;
            }

            #fusionEmotionDisplay {
                grid-column: auto;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    
    <div class="realtime-container">
        
        <div class="header">
            <h1>🎤 Real-Time Emotion Recognition</h1>
            <p>Audio + Face Detection | Updates every second</p>
        </div>

        <div class="main-grid">
            
            <!-- Capture Section -->
            <div class="section">
                <h2>📹 Capture</h2>
                
                <div class="capture-container">
                    <div class="status-box">
                        <div class="status-indicator" id="statusIndicator"></div>
                        <div>
                            <div style="font-size: 0.85rem; color: #94a3b8;">Status</div>
                            <div id="statusText" style="font-weight: 600; color: #cbd5e1;">Ready</div>
                        </div>
                    </div>

                    <div class="video-preview">
                        <video id="video" playsinline autoplay muted></video>
                    </div>

                    <div>
                        <div style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 8px;">Audio Level</div>
                        <div class="audio-visualizer" id="audioVisualizer"></div>
                    </div>

                    <div class="controls">
                        <button class="btn btn-primary" id="startBtn" onclick="startCapture()">Start</button>
                        <button class="btn btn-danger" id="stopBtn" onclick="stopCapture()" disabled>Stop</button>
                    </div>
                </div>
            </div>

            <!-- Live Results -->
            <div class="section">
                <h2>📊 Live Results</h2>
                
                <div class="results-grid">
                    <div class="emotion-display" id="audioEmotionDisplay">
                        <div class="emotion-label">Audio</div>
                        <div class="emotion-value" id="audioEmotion">--</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="audioConfidenceFill" style="width: 0%;"></div>
                        </div>
                        <div class="confidence-text" id="audioConfidenceText">0%</div>
                    </div>

                    <div class="emotion-display" id="faceEmotionDisplay">
                        <div class="emotion-label">Face</div>
                        <div class="emotion-value" id="faceEmotion">--</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="faceConfidenceFill" style="width: 0%;"></div>
                        </div>
                        <div class="confidence-text" id="faceConfidenceText">0%</div>
                    </div>

                    <div class="emotion-display" id="fusionEmotionDisplay" style="grid-column: 1 / -1;">
                        <div class="emotion-label">Final Result</div>
                        <div class="emotion-value" id="fusionEmotion">--</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="fusionConfidenceFill" style="width: 0%;"></div>
                        </div>
                        <div class="confidence-text" id="fusionConfidenceText">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Debug Log -->
        <div class="debug-log" id="debugLog"></div>

    </div>

    <!-- Load Models -->
    <script async src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.5.0/dist/tf-core.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.5.0/dist/tf-converter.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
    
    <!-- Audio Emotion Recognition Modules -->
    <script src="ml/audioCapture.js"></script>
    <script src="ml/audioEmotionPredictor.js"></script>
    <script src="ml/emotionEventBuffer.js"></script>
    <script src="ml/advancedMultimodalFusion.js"></script>
    <script src="ml/audioIntegrationExample.js"></script>
    
    <!-- Optional: Meyda for advanced audio analysis -->
    <script src="https://cdn.jsdelivr.net/npm/meyda@4.3.0"></script>

    <script>
        let state = {
            isCapturing: false,
            modelsLoaded: false,
            enableBackendAudioApi: false,
            audioContext: null,
            analyser: null,
            mediaRecorder: null,
            recorderMimeType: '',
            recorderFileExt: 'webm',
            audioPredictor: null,
            animationId: null,
            silenceCounter: 0,
            isSilent: true,
            lastChunkTime: 0,
            previousAudioLevel: 0,
            speechLevelThreshold: 18,
            noiseFloorRms: 0.01,
            calibrationFrames: 0,
            audioChunks: [],
            faceDetectInterval: null,
            currentFace: { emotion: '--', confidence: 0 },
            currentAudio: { emotion: '--', confidence: 0 }
        };

        function log(msg, type = 'info') {
            const debugLog = document.getElementById('debugLog');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.textContent = `[${time}] ${msg}`;
            debugLog.appendChild(line);
            debugLog.scrollTop = debugLog.scrollHeight;
            while (debugLog.children.length > 20) debugLog.removeChild(debugLog.firstChild);
            console.log(msg);
        }

        function updateStatus(text, active = false) {
            document.getElementById('statusText').textContent = text;
            const indicator = document.getElementById('statusIndicator');
            if (active) {
                indicator.classList.add('active');
            } else {
                indicator.classList.remove('active');
            }
        }

        function createCompatibleRecorder(stream) {
            if (typeof MediaRecorder === 'undefined') {
                throw new Error('MediaRecorder is not supported in this browser');
            }

            const audioTracks = stream.getAudioTracks();
            if (!audioTracks || audioTracks.length === 0) {
                throw new Error('No audio track available from microphone');
            }

            const audioOnlyStream = new MediaStream(audioTracks);
            const mimeCandidates = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/ogg;codecs=opus',
                'audio/mp4',
                ''
            ];

            for (const mimeType of mimeCandidates) {
                try {
                    if (!mimeType || MediaRecorder.isTypeSupported(mimeType)) {
                        const recorder = mimeType
                            ? new MediaRecorder(audioOnlyStream, { mimeType })
                            : new MediaRecorder(audioOnlyStream);
                        const ext = mimeType.includes('ogg') ? 'ogg' : (mimeType.includes('mp4') ? 'mp4' : 'webm');
                        return { recorder, mimeType: mimeType || 'default', ext };
                    }
                } catch (_) {
                    // Try next candidate.
                }
            }

            throw new Error('No compatible MediaRecorder audio MIME type available');
        }

        async function startCapture() {
            try {
                log('Starting capture...', 'info');
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                });

                const video = document.getElementById('video');
                video.srcObject = stream;
                log('Camera opened', 'success');

                // Audio setup
                state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                state.analyser = state.audioContext.createAnalyser();
                state.analyser.fftSize = 256;
                
                const source = state.audioContext.createMediaStreamSource(stream);
                source.connect(state.analyser);
                log('Audio context ready', 'success');

                // Use calibrated local classifier for stable realtime emotion mapping.
                state.audioPredictor = null;
                state.noiseFloorRms = 0.01;
                state.calibrationFrames = 0;
                log('Local audio classifier ready', 'success');

                // Media recorder (audio-only stream + MIME fallback)
                const recorderSetup = createCompatibleRecorder(stream);
                state.mediaRecorder = recorderSetup.recorder;
                state.recorderMimeType = recorderSetup.mimeType;
                state.recorderFileExt = recorderSetup.ext;
                state.audioChunks = [];
                state.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) state.audioChunks.push(e.data);
                };
                state.mediaRecorder.start(1000);
                log(`Recorder ready (${state.recorderMimeType})`, 'success');

                // UI
                state.isCapturing = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                updateStatus('Recording...', true);

                // Load models
                if (!state.modelsLoaded) {
                    await loadModels();
                }

                // Start loops
                analyzeAudio();
                detectFace();
                sendAudio();

            } catch (err) {
                log(`ERROR: ${err.message}`, 'error');
                updateStatus('Error', false);
                if (document.getElementById('video').srcObject) {
                    document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
                    document.getElementById('video').srcObject = null;
                }
            }
        }

        function stopCapture() {
            state.isCapturing = false;
            if (document.getElementById('video').srcObject) {
                document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
            }
            if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
                state.mediaRecorder.stop();
            }
            if (state.animationId) cancelAnimationFrame(state.animationId);
            if (state.faceDetectInterval) clearInterval(state.faceDetectInterval);

            state.currentFace = { emotion: '--', confidence: 0 };
            state.currentAudio = { emotion: '--', confidence: 0 };
            updateFinalDisplay('--', 0);
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            updateStatus('Stopped', false);
            log('Capture stopped', 'success');
        }

        async function loadModels() {
            try {
                log('Loading face detection models...', 'info');

                // Wait for faceapi script to become available (scripts are async).
                const maxWaitMs = 8000;
                const start = Date.now();
                while (typeof faceapi === 'undefined') {
                    if (Date.now() - start > maxWaitMs) {
                        throw new Error('face-api library not available');
                    }
                    await new Promise(resolve => setTimeout(resolve, 200));
                }

                const sources = [
                    '/models',
                    'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model'
                ];

                let loaded = false;
                for (const uri of sources) {
                    try {
                        await faceapi.nets.tinyFaceDetector.loadFromUri(uri);
                        await faceapi.nets.faceExpressionNet.loadFromUri(uri);
                        loaded = true;
                        log(`Face models loaded from ${uri}`, 'success');
                        break;
                    } catch (modelError) {
                        log(`Face model source failed: ${uri}`, 'error');
                    }
                }

                if (!loaded) {
                    throw new Error('Unable to load face models from local or CDN sources');
                }

                state.modelsLoaded = true;
                log('Face analysis ready', 'success');
            } catch (e) {
                log(`Model error: ${e.message}`, 'error');
            }
        }

        function analyzeAudio() {
            if (!state.isCapturing) return;

            const data = new Uint8Array(state.analyser.frequencyBinCount);
            state.analyser.getByteFrequencyData(data);

            const timeData = new Uint8Array(state.analyser.fftSize);
            state.analyser.getByteTimeDomainData(timeData);

            const rms = calculateRms(timeData);
            const peak = calculatePeak(timeData);

            // Draw visualizer
            const container = document.getElementById('audioVisualizer');
            container.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const avg = data.slice(i * 12, (i + 1) * 12).reduce((a, b) => a + b, 0) / 12;
                const bar = document.createElement('div');
                bar.className = 'audio-bar';
                bar.style.height = Math.max((avg / 255) * 100, 5) + '%';
                container.appendChild(bar);
            }

            // Detect speech
            // Calibrate first ~2 seconds to room noise floor.
            if (state.calibrationFrames < 120) {
                state.noiseFloorRms = (state.noiseFloorRms * 0.95) + (rms * 0.05);
                state.calibrationFrames++;
            }

            const dynamicSpeechThreshold = Math.max(0.006, state.noiseFloorRms * 1.6);
            const isSpeech = (rms > dynamicSpeechThreshold) || (peak > 0.09);

            if (!isSpeech) {
                state.silenceCounter++;
                if (state.silenceCounter > 5) {
                    state.isSilent = true;
                }
            } else {
                state.silenceCounter = 0;
                state.isSilent = false;
            }

            // Realtime classifier focused on spoken/laughter tone characteristics.
            if (!state.isSilent) {
                const features = extractRealtimeAudioFeatures(data, rms, peak);
                const prediction = predictRealtimeAudioEmotion(features);
                updateAudioDisplay(prediction.emotion.toUpperCase(), prediction.confidence);
            } else {
                // No speech: show low-confidence neutral instead of blank output.
                updateAudioDisplay('NEUTRAL', 0.05);
            }

            state.animationId = requestAnimationFrame(analyzeAudio);
        }

        function calculateRms(timeData) {
            let sumSq = 0;
            for (let i = 0; i < timeData.length; i++) {
                const normalized = (timeData[i] - 128) / 128;
                sumSq += normalized * normalized;
            }
            return Math.sqrt(sumSq / timeData.length);
        }

        function calculatePeak(timeData) {
            let peak = 0;
            for (let i = 0; i < timeData.length; i++) {
                const v = Math.abs((timeData[i] - 128) / 128);
                if (v > peak) peak = v;
            }
            return peak;
        }

        function extractRealtimeAudioFeatures(freqData, rms, peak) {
            let weightedSum = 0;
            let magnitudeSum = 0;
            for (let i = 0; i < freqData.length; i++) {
                const v = freqData[i] / 255;
                weightedSum += i * v;
                magnitudeSum += v;
            }

            const centroidNorm = magnitudeSum > 0 ? (weightedSum / magnitudeSum) / freqData.length : 0;
            const spectralCentroid = centroidNorm;
            const zcrApprox = Math.min(1, Math.abs(rms - state.previousAudioLevel) * 20);
            state.previousAudioLevel = rms;

            // Spectral spread proxy (variance around centroid).
            let varSum = 0;
            if (magnitudeSum > 0) {
                for (let i = 0; i < freqData.length; i++) {
                    const v = freqData[i] / 255;
                    const pos = i / freqData.length;
                    const d = pos - centroidNorm;
                    varSum += d * d * v;
                }
            }
            const spread = magnitudeSum > 0 ? Math.min(1, (varSum / magnitudeSum) * 14) : 0;

            // High-band ratio helps separate laughter/bright speech from low monotone speech.
            const split = Math.floor(freqData.length * 0.45);
            let low = 0;
            let high = 0;
            for (let i = 0; i < freqData.length; i++) {
                if (i < split) low += freqData[i];
                else high += freqData[i];
            }
            const highBandRatio = (high + 1) / (low + high + 1);

            return {
                rms,
                peak,
                spectralCentroid,
                spread,
                highBandRatio,
                zeroCrossingRate: zcrApprox,
                timestamp: Date.now()
            };
        }

        function predictRealtimeAudioEmotion(f) {
            const energy = Math.max(0, Math.min(1, (f.rms - state.noiseFloorRms) / 0.08));
            const bright = Math.max(0, Math.min(1, (f.spectralCentroid - 0.22) / 0.45));
            const dynamic = Math.max(0, Math.min(1, f.spread));
            const highBand = Math.max(0, Math.min(1, f.highBandRatio * 1.6));

            // Laugh/happy speech: stronger energy + brighter spectrum + dynamics.
            let happyScore = (0.42 * energy) + (0.25 * bright) + (0.23 * dynamic) + (0.10 * highBand);

            // Sad speech: low energy + low brightness + low dynamics.
            let sadScore = (0.55 * (1 - energy)) + (0.25 * (1 - bright)) + (0.20 * (1 - dynamic));

            // Mild guard: if energy is clearly high, strongly penalize sad.
            if (energy > 0.55) sadScore *= 0.45;
            if (energy < 0.22) happyScore *= 0.5;

            if (happyScore >= sadScore) {
                return {
                    emotion: 'happy',
                    confidence: Math.max(0.2, Math.min(0.98, happyScore))
                };
            }

            return {
                emotion: 'sad',
                confidence: Math.max(0.2, Math.min(0.9, sadScore))
            };
        }

        function sendAudio() {
            if (!state.isCapturing) return;

            if (!state.enableBackendAudioApi) {
                setTimeout(sendAudio, 500);
                return;
            }

            if (!state.mediaRecorder) {
                setTimeout(sendAudio, 250);
                return;
            }

            const now = Date.now();
            if (now - state.lastChunkTime >= 2000 && state.audioChunks.length > 0) {
                const blobType = state.recorderMimeType === 'default' ? 'audio/webm' : state.recorderMimeType;
                const blob = new Blob(state.audioChunks, { type: blobType });
                state.audioChunks = [];
                state.lastChunkTime = now;
                
                log('Sending audio chunk...', 'info');

                const formData = new FormData();
                formData.append('audio', blob, `audio.${state.recorderFileExt}`);

                fetch('/api/emotion/audio', { method: 'POST', body: formData })
                    .then(r => r.json())
                    .then(result => {
                        if (result.success) {
                            const e = result.emotion.toUpperCase();
                            const normalizedConfidence = result.confidence > 1 ? result.confidence / 100 : result.confidence;
                            const c = Math.round(normalizedConfidence * 100);
                            log(`Audio: ${e} (${c}%)`, 'success');
                            updateAudioDisplay(e, normalizedConfidence);
                        } else if (result.error) {
                            log(`Audio API error: ${result.error}`, 'error');
                        }
                    })
                    .catch(e => log(`API error: ${e}`, 'error'));
            }

            setTimeout(sendAudio, 100);
        }

        function updateAudioDisplay(emotion, confidence) {
            document.getElementById('audioEmotion').textContent = emotion;
            const c = Math.round(confidence * 100);
            document.getElementById('audioConfidenceFill').style.width = c + '%';
            document.getElementById('audioConfidenceText').textContent = c + '%';
            const audioCard = document.getElementById('audioEmotionDisplay');
            if (audioCard) {
                if (emotion !== '--') {
                    audioCard.classList.add('active');
                } else {
                    audioCard.classList.remove('active');
                }
            }

            state.currentAudio = { emotion, confidence };
            updateFinalDisplay();
        }

        async function detectFace() {
            if (!state.isCapturing || !state.modelsLoaded) {
                setTimeout(detectFace, 500);
                return;
            }

            try {
                const video = document.getElementById('video');
                if (!video || video.readyState < 2 || video.videoWidth === 0 || video.videoHeight === 0) {
                    setTimeout(detectFace, 250);
                    return;
                }

                const detections = await faceapi
                    .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.45 }))
                    .withFaceExpressions();

                if (detections && detections.expressions) {
                    const [emotion, score] = Object.entries(detections.expressions)
                        .sort((a, b) => b[1] - a[1])[0];
                    const e = emotion.toUpperCase();
                    const c = Math.round(score * 100);
                    log(`Face: ${e} (${c}%)`, 'success');
                    updateFaceDisplay(e, score);
                } else {
                    updateFaceDisplay('--', 0);
                }
            } catch (e) {
                log(`Face error: ${e.message}`, 'error');
            }

            setTimeout(detectFace, 500);
        }

        function updateFaceDisplay(emotion, confidence) {
            document.getElementById('faceEmotion').textContent = emotion;
            const c = Math.round(confidence * 100);
            document.getElementById('faceConfidenceFill').style.width = c + '%';
            document.getElementById('faceConfidenceText').textContent = c + '%';
            
            const faceCard = document.getElementById('faceEmotionDisplay');
            if (faceCard) {
                if (emotion !== '--') {
                    faceCard.classList.add('active');
                } else {
                    faceCard.classList.remove('active');
                }
            }

            state.currentFace = { emotion, confidence };
            updateFinalDisplay();
        }

        function updateFinalDisplay() {
            const face = state.currentFace;
            const audio = state.currentAudio;

            let finalEmotion = '--';
            let finalConfidence = 0;

            if (face.emotion !== '--' && audio.emotion !== '--') {
                if (face.emotion === audio.emotion) {
                    finalEmotion = face.emotion;
                    finalConfidence = Math.min(1, (face.confidence * 0.6) + (audio.confidence * 0.4) + 0.1);
                } else {
                    finalEmotion = face.confidence >= audio.confidence ? face.emotion : audio.emotion;
                    finalConfidence = Math.max(face.confidence, audio.confidence) * 0.85;
                }
            } else if (face.emotion !== '--') {
                finalEmotion = face.emotion;
                finalConfidence = face.confidence;
            } else if (audio.emotion !== '--') {
                finalEmotion = audio.emotion;
                finalConfidence = audio.confidence;
            }

            document.getElementById('fusionEmotion').textContent = finalEmotion;
            const c = Math.round(finalConfidence * 100);
            document.getElementById('fusionConfidenceFill').style.width = c + '%';
            document.getElementById('fusionConfidenceText').textContent = c + '%';

            const fusionCard = document.getElementById('fusionEmotionDisplay');
            if (fusionCard) {
                if (finalEmotion !== '--') {
                    fusionCard.classList.add('active');
                } else {
                    fusionCard.classList.remove('active');
                }
            }
        }

        window.addEventListener('load', () => {
            log('Dashboard ready', 'success');
        });
    </script>
</body>
</html>
